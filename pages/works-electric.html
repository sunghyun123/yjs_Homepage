  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    :root { --accent-color: #c62828; --nav-hover-color: #c62828; --nav-dropdown-hover-color: #c62828; }

    /* 갤러리 카드 */
    .gallery-item {
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      position: relative;
    }
    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .gallery-item:hover img { transform: scale(1.05); }

    .gallery-item .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(198,40,40,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .gallery-item:hover .gallery-overlay { background: rgba(198,40,40,0.55); }
    .gallery-overlay i {
      color: #fff;
      font-size: 2rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .gallery-item:hover .gallery-overlay i { opacity: 1; }

    .gallery-caption {
      padding: 10px 14px;
      background: #fff;
      font-size: 0.82rem;
      color: #555;
    }

</style>
