  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    :root { --accent-color: #c62828; --nav-hover-color: #c62828; --nav-dropdown-hover-color: #c62828; }

    /* ── Org Chart wrapper ── */
    .org-wrapper {
      background: #eef1f6;
      border-radius: 12px;
      padding: 48px 32px 48px;
      overflow-x: auto;
    }

    .org-chart {
      min-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── CEO box ── */
    .ceo-box {
      background: #1b2c4b;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 15px 64px;
      border-radius: 10px;
      letter-spacing: 0.04em;
    }

    /* vertical line from CEO down */
    .ceo-vline {
      width: 2px;
      height: 36px;
      background: #9aa3b0;
      flex-shrink: 0;
    }

    /* ── Department row ── */
    .dept-row {
      display: flex;
      width: 100%;
      justify-content: center;
    }

    .dept-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-top: 34px;
    }

    /* Horizontal connecting line: right-half on first col, left-half on last col, full on middle */
    .dept-col::before {
      content: '';
      position: absolute;
      top: 0;
      height: 2px;
      background: #9aa3b0;
      left: 50%;
      right: 0;
    }
    .dept-col:last-child::before {
      left: 0;
      right: 50%;
    }
    .dept-col:not(:first-child):not(:last-child)::before {
      left: 0;
      right: 0;
    }

    /* Vertical tick from h-line to dept box */
    .dept-col::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 34px;
      background: #9aa3b0;
    }

    /* ── Department box ── */
    .dept-box {
      background: #fff;
      border: 2.5px solid #c62828;
      border-radius: 32px;
      padding: 13px 26px;
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
      min-width: 130px;
      text-align: center;
      white-space: nowrap;
    }

    /* ── Sub-item list ── */
    .sub-list {
      list-style: none;
      padding: 0 0 0 18px;
      margin: 20px 0 0 0;
      border-left: 2px solid #c0c5ce;
    }

    .sub-list li {
      padding: 9px 8px 9px 0;
      font-size: 0.9rem;
      color: #555;
      position: relative;
      white-space: nowrap;
    }

    .sub-list li::before {
      content: '';
      position: absolute;
      left: -18px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 2px;
      background: #c0c5ce;
    }

    /* ── Stats section ── */
    .stat-card-sm {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-top: 4px solid #c62828;
      border-radius: 8px;
      padding: 24px 16px 20px;
      text-align: center;
      height: 100%;
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
    }

    .stat-card-sm .stat-num {
      font-size: 2rem;
      font-weight: 900;
      color: #c62828;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .stat-card-sm .stat-label {
      font-size: 0.85rem;
      color: #666;
    }

    .section-heading {
      font-size: 1.1rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-heading::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 18px;
      background: #c62828;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="starter-page-page">

  <main class="main">

        <!-- 인력 현황 -->

          <div class="row g-3">

            </div>
            <div class="col-6 col-md-3">

                <div class="stat-num">무정전전공</div>
                <div class="stat-label">특수 자격 보유 인력</div>

            </div>
          </div>
        </div>

      </div>
