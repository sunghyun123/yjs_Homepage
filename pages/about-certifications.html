    body { font-family: 'Noto Sans KR', sans-serif; }

    .cert-section-title {

      font-weight: 700;
      color: #c62828;
      border-left: 4px solid #c62828;
      padding-left: 12px;
      margin-bottom: 1.2rem;
    }

    .cert-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      background: #fff;
      height: 100%;
    }
    .cert-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      transform: translateY(-3px);
    }

    .cert-img-wrap {
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cert-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.3s;
    }
    .cert-img-wrap:hover img {
      transform: scale(1.03);
    }

    .cert-body {
      padding: 16px;
    }
    .cert-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .cert-badge {
      font-size: 0.72rem;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 500;
    }
    .cert-view-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.82rem;
      color: #c62828;
      font-weight: 600;
      text-decoration: none;
      border: 1.5px solid #c62828;
      border-radius: 20px;
      padding: 4px 14px;
      transition: background 0.2s, color 0.2s;
    }
    .cert-view-btn:hover {
