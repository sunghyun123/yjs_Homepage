<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>입사지원 - 영전사</title>
  <meta name="description" content="㈜영전사 입사지원 안내입니다.">
  <link href="../assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="../assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="../assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">
  <link href="../assets/css/main.css" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    :root { --accent-color: #c62828; --nav-hover-color: #c62828; --nav-dropdown-hover-color: #c62828; }
  </style>
</head>
<body class="starter-page-page">
  <div id="site-header"></div>
  <main class="main">
    <div class="page-title" data-aos="fade">
      <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">입사지원</h1>
        <nav class="breadcrumbs">
          <ol>
            <li><a href="../index.html">Home</a></li>
            <li class="current">입사지원</li>
          </ol>
        </nav>
      </div>
    </div>
    <section class="section">
      <div class="container" data-aos="fade-up">
        <p><strong>이력서·자기소개서 등 파일 첨부</strong>는 브라우저 mailto로는 불편할 수 있습니다. 아래 내용을 메일로 보내거나, 구글폼 링크를 추가하는 방식을 권장합니다.</p>
        <form id="mailto-careers-form" class="border rounded-3 p-4 bg-white shadow-sm">
          <div class="row gy-3">
            <div class="col-md-6">
              <label class="form-label" for="ap-name">이름</label>
              <input type="text" class="form-control" name="name" id="ap-name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="ap-email">이메일</label>
              <input type="email" class="form-control" name="email" id="ap-email" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="ap-position">지원 분야</label>
              <input type="text" class="form-control" name="position" id="ap-position" placeholder="예: 전기공사 경력" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="ap-cover">간단 자기소개</label>
              <textarea class="form-control" name="message" id="ap-cover" rows="6" required></textarea>
            </div>
            <div class="col-12">
              <label class="form-label" for="ap-subject">제목(자동)</label>
              <input type="text" class="form-control" name="subject" id="ap-subject" value="[입사지원] 지원서 사전안내" required>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="agree" value="yes" id="ap-agree" required>
                <label class="form-check-label" for="ap-agree">개인정보 수집·이용에 동의합니다. (<a href="privacy.html">내용 보기</a>)</label>
              </div>
            </div>
            <div class="col-12 text-center">
              <button type="submit" class="btn btn-danger px-5">지원 내용 메일로 열기</button>
            </div>
          </div>
        </form>
        <p class="small text-muted mt-3 mb-0">실제 운영 시: 이력서는 <strong>admin@yjselect.com</strong>으로 첨부 발송 안내 문구를 넣으세요.</p>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/vendor/php-email-form/validate.js"></script>
  <script src="../assets/vendor/aos/aos.js"></script>
  <script src="../assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="../assets/vendor/waypoints/noframework.waypoints.js"></script>
  <script src="../assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="../assets/vendor/swiper/swiper-bundle.min.js"></script>
  <script src="../assets/vendor/imagesloaded/imagesloaded.pkgd.min.js"></script>
  <script src="../assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="../assets/js/site-shell.js" data-active="careers-apply"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/inquiry-mailto.js"></script>
</body>
</html>
