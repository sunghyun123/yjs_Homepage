    <section class="section">
      <div class="container" data-aos="fade-up">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <form id="emailjs-careers-form" class="border rounded-3 p-4 bg-white shadow-sm">
              <input type="hidden" name="form_type" value="채용문의">
              <div class="row gy-3">
                <div class="col-md-6">
                  <label class="form-label" for="cr-name">이름</label>

                  <label class="form-label" for="cr-subject">제목</label>

                </div>
                <div class="col-12">
                  <label class="form-label" for="cr-msg">문의 내용</label>
                  <textarea class="form-control" name="message" id="cr-msg" rows="5" required></textarea>

                <div class="col-12">
                  <div class="form-check">

                <div class="col-12 text-center">
